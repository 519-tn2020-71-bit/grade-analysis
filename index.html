<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All-in-One 통합 성적 및 등급 계산기</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Pretendard', sans-serif; background-color: #f3f4f6; }
        .fade-in { animation: fadeIn 0.4s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .sticky-header th { position: sticky; top: 0; background-color: #f9fafb; z-index: 10; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-7xl mx-auto bg-white rounded-2xl shadow-xl overflow-hidden">
        <div class="bg-gradient-to-r from-blue-800 to-indigo-900 p-6 text-white flex justify-between items-center">
            <div>
                <h1 class="text-3xl font-bold"><i class="fas fa-calculator text-yellow-400 mr-2"></i> 통합 성적/등급 계산기</h1>
                <p class="mt-2 text-blue-200">항목을 자유롭게 추가하고 나이스 엑셀 파일(.xlsx, .csv)을 업로드하세요.</p>
            </div>
            <div class="hidden md:block">
                <span class="bg-yellow-400 text-blue-900 text-xs font-black px-3 py-1 rounded-full">스마트 파싱 & 엑셀 지원 엔진</span>
            </div>
        </div>

        <div class="p-6 md:p-8">
            <div id="errorMessage" class="hidden fade-in bg-red-50 border-l-4 border-red-500 p-4 mb-6 rounded-r-lg shadow-sm">
                <div class="flex">
                    <div class="flex-shrink-0"><i class="fas fa-exclamation-triangle text-red-500 mt-1"></i></div>
                    <div class="ml-3">
                        <h3 class="text-sm font-bold text-red-800">확인이 필요합니다</h3>
                        <div class="mt-1 text-sm text-red-700" id="errorText"></div>
                    </div>
                </div>
            </div>

            <div class="bg-gray-50 rounded-xl p-6 mb-8 border border-gray-200 shadow-inner">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-lg font-bold text-gray-800"><i class="fas fa-list-check text-blue-600 mr-2"></i> 평가 항목 설정</h2>
                    <button onclick="addEvalRow()" class="bg-blue-100 hover:bg-blue-200 text-blue-700 text-sm font-bold py-1.5 px-3 rounded transition flex items-center">
                        <i class="fas fa-plus mr-1"></i> 항목 추가
                    </button>
                </div>
                
                <div id="evalContainer" class="space-y-3">
                    <!-- 항목이 동적 렌더링 됨 -->
                </div>

                <div class="mt-8 flex justify-center border-t pt-6 border-gray-200">
                    <button onclick="executeAllInOne()" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-12 rounded-full shadow-lg transition transform hover:-translate-y-1 text-lg flex items-center">
                        <i class="fas fa-rocket mr-2"></i> 성적 합산 및 등급 컷 계산
                    </button>
                </div>
            </div>

            <!-- 결과 대시보드 -->
            <div id="resultsArea" class="hidden fade-in space-y-8">
                <!-- 요약 카드 -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="bg-white border border-blue-100 rounded-xl shadow-md p-6 flex items-center justify-between relative overflow-hidden">
                        <div class="absolute right-0 top-0 w-24 h-24 bg-blue-50 rounded-bl-full z-0"></div>
                        <div class="relative z-10">
                            <p class="text-sm text-gray-500 font-bold mb-1">최종 등급 산출 대상 인원</p>
                            <p class="text-5xl font-black text-blue-600" id="totalCount">- <span class="text-2xl font-bold">명</span></p>
                        </div>
                        <i class="fas fa-users text-5xl text-blue-200 relative z-10"></i>
                    </div>
                    
                    <div class="bg-white border border-red-100 rounded-xl shadow-md p-6 relative overflow-hidden">
                        <div class="absolute right-0 top-0 w-24 h-24 bg-red-50 rounded-bl-full z-0"></div>
                        <div class="relative z-10 flex justify-between items-start w-full">
                            <div class="w-full">
                                <p class="text-sm text-gray-500 font-bold mb-1">자동 제외 대상자 (자퇴/결시 등)</p>
                                <p class="text-4xl font-black text-red-500" id="dropCount">- 명</p>
                                <div id="dropNames" class="mt-2 text-sm text-red-600 font-medium bg-red-50 p-2 rounded-lg border border-red-100 inline-block max-h-24 overflow-y-auto w-full break-words"></div>
                            </div>
                            <i class="fas fa-user-times text-4xl text-red-200"></i>
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                    <!-- 9등급 커트라인 -->
                    <div class="lg:col-span-1 bg-white rounded-xl shadow-md border border-gray-200 overflow-hidden flex flex-col">
                        <div class="bg-indigo-50 px-6 py-4 border-b border-gray-200">
                            <h3 class="text-lg font-bold text-indigo-900"><i class="fas fa-trophy mr-2 text-indigo-600"></i>9등급 커트라인</h3>
                        </div>
                        <div class="overflow-x-auto flex-grow">
                            <table class="min-w-full divide-y divide-gray-200 text-center h-full">
                                <thead class="bg-gray-50">
                                    <tr>
                                        <th class="px-4 py-3 text-xs font-bold text-gray-500 uppercase">등급</th>
                                        <th class="px-4 py-3 text-xs font-bold text-gray-500 uppercase">누적 인원</th>
                                        <th class="px-4 py-3 text-xs font-bold text-indigo-600 uppercase">커트라인</th>
                                    </tr>
                                </thead>
                                <tbody id="gradeTableBody" class="bg-white divide-y divide-gray-200">
                                </tbody>
                            </table>
                        </div>
                    </div>

                    <!-- 반별 등급 분포도 -->
                    <div class="lg:col-span-2 bg-white rounded-xl shadow-md border border-gray-200 overflow-hidden flex flex-col">
                        <div class="bg-green-50 px-6 py-4 border-b border-gray-200">
                            <h3 class="text-lg font-bold text-green-900"><i class="fas fa-th mr-2 text-green-600"></i>반별 등급 분포도</h3>
                        </div>
                        <div class="overflow-x-auto p-4 flex-grow flex items-center">
                            <table class="min-w-full divide-y divide-gray-300 text-center border">
                                <thead class="bg-gray-100">
                                    <tr>
                                        <th class="px-3 py-3 font-bold text-gray-700 border-r">반 \ 등급</th>
                                        <th class="px-2 py-3 text-sm font-bold text-gray-600">1</th>
                                        <th class="px-2 py-3 text-sm font-bold text-gray-600">2</th>
                                        <th class="px-2 py-3 text-sm font-bold text-gray-600">3</th>
                                        <th class="px-2 py-3 text-sm font-bold text-gray-600 bg-blue-50">4</th>
                                        <th class="px-2 py-3 text-sm font-bold text-gray-600 bg-blue-50">5</th>
                                        <th class="px-2 py-3 text-sm font-bold text-gray-600 bg-blue-50">6</th>
                                        <th class="px-2 py-3 text-sm font-bold text-gray-600">7</th>
                                        <th class="px-2 py-3 text-sm font-bold text-gray-600">8</th>
                                        <th class="px-2 py-3 text-sm font-bold text-gray-600">9</th>
                                        <th class="px-3 py-3 text-sm font-black text-gray-800 border-l bg-gray-200">계</th>
                                    </tr>
                                </thead>
                                <tbody id="distTableBody" class="bg-white divide-y divide-gray-200">
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <!-- 학생별 성적 상세 내역 -->
                <div class="bg-white rounded-xl shadow-md border border-gray-200 overflow-hidden mt-8">
                    <div class="bg-gray-800 px-6 py-4 border-b border-gray-200 flex justify-between items-center">
                        <h3 class="text-lg font-bold text-white"><i class="fas fa-search-plus mr-2 text-yellow-400"></i>학생별 성적 상세 내역</h3>
                        <span class="text-gray-300 text-sm">※ 점수 계산 검증 및 확인용</span>
                    </div>
                    <div class="overflow-x-auto max-h-[600px] overflow-y-auto">
                        <table class="min-w-full divide-y divide-gray-200 text-center text-sm">
                            <thead class="sticky-header" id="detailTableHeader">
                                <!-- JS로 동적 렌더링 됨 -->
                            </thead>
                            <tbody id="detailTableBody" class="bg-white divide-y divide-gray-200">
                                <!-- JS로 동적 렌더링 됨 -->
                            </tbody>
                        </table>
                    </div>
                </div>
                
            </div>
        </div>
    </div>

    <script>
        // 학적 변동 및 결시 제외 키워드
        const DROP_KEYWORDS = ['자퇴', '전출', '제적', '유예', '면제', '위탁'];
        let rowCount = 0;

        function showError(msg) {
            const errDiv = document.getElementById('errorMessage');
            document.getElementById('errorText').innerText = msg;
            errDiv.classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
        function hideError() {
            document.getElementById('errorMessage').classList.add('hidden');
        }

        function addEvalRow(defaultName = "", defaultWeight = "") {
            rowCount++;
            const container = document.getElementById('evalContainer');
            const nameValue = defaultName || `평가항목 ${rowCount}`;
            
            const rowDiv = document.createElement('div');
            rowDiv.className = "eval-row bg-white border border-gray-200 rounded-lg p-3 shadow-sm flex flex-col md:flex-row md:items-center gap-3 fade-in";
            
            rowDiv.innerHTML = `
                <div class="flex-1 flex items-center gap-2">
                    <span class="text-gray-400 font-bold"><i class="fas fa-bars"></i></span>
                    <input type="text" value="${nameValue}" class="eval-name w-full md:w-40 border-b-2 border-gray-300 bg-transparent px-2 py-1 font-bold text-gray-700 focus:outline-none focus:border-indigo-500" placeholder="항목명 (예: 1회고사)">
                </div>
                <div class="flex items-center gap-2">
                    <label class="text-sm font-bold text-gray-600">비율:</label>
                    <input type="number" value="${defaultWeight}" class="eval-weight w-16 border-b-2 border-blue-500 bg-gray-50 px-2 py-1 text-center font-bold text-blue-700 focus:outline-none" placeholder="0">
                    <span class="text-gray-500 font-bold">%</span>
                </div>
                <div class="flex-grow">
                    <input type="file" accept=".xlsx, .xls, .csv" class="eval-file w-full text-sm cursor-pointer file:mr-2 file:py-1 file:px-3 file:rounded-full file:border-0 file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100">
                </div>
                <div class="flex-shrink-0">
                    <button onclick="this.closest('.eval-row').remove()" class="text-red-400 hover:text-red-600 p-2 rounded-full hover:bg-red-50 transition" title="항목 삭제">
                        <i class="fas fa-trash-alt"></i>
                    </button>
                </div>
            `;
            container.appendChild(rowDiv);
        }

        window.onload = () => {
            addEvalRow("1회고사", 30);
            addEvalRow("2회고사", 30);
            addEvalRow("수행평가(구술)", 20);
            addEvalRow("수행평가(에세이)", 20);
        };

        async function readFile(file) {
            return new Promise((resolve, reject) => {
                const ext = file.name.split('.').pop().toLowerCase();
                const reader = new FileReader();

                if (ext === 'xlsx' || ext === 'xls') {
                    reader.readAsArrayBuffer(file);
                    reader.onload = (e) => {
                        try {
                            const data = new Uint8Array(e.target.result);
                            const workbook = XLSX.read(data, { type: 'array' });
                            const firstSheetName = workbook.SheetNames[0];
                            const worksheet = workbook.Sheets[firstSheetName];
                            const csvText = XLSX.utils.sheet_to_csv(worksheet);
                            resolve(csvText);
                        } catch (err) {
                            reject(new Error("엑셀 파일 파싱 실패: 파일이 손상되었거나 지원하지 않는 포맷입니다."));
                        }
                    };
                } else {
                    reader.readAsText(file, 'euc-kr');
                    reader.onload = (e) => {
                        let text = e.target.result;
                        text = text.replace(/^\uFEFF/, '');
                        if (!text.includes('반') && !text.includes('번호') && !text.includes('평가')) {
                            const utf8Reader = new FileReader();
                            utf8Reader.readAsText(file, 'utf-8');
                            utf8Reader.onload = (e2) => resolve(e2.target.result.replace(/^\uFEFF/, ''));
                            utf8Reader.onerror = () => resolve(text);
                        } else {
                            resolve(text);
                        }
                    };
                }
                reader.onerror = () => reject(new Error("파일 읽기 실패"));
            });
        }

        function parseCSVData(csvText, itemName) {
            const lines = csvText.replace(/\r/g, '').split('\n');
            let isDataRow = false;
            let classColumns = [];
            let data = {};
            let headerFound = false;

            for (let i = 0; i < lines.length; i++) {
                let line = lines[i];
                if (!line.trim()) continue;

                let cols = line.split(',').map(c => c.replace(/"/g, '').trim()); 
                let firstCol = cols[0] || '';
                let cleanFirst = firstCol.replace(/[^가-힣0-9a-zA-Z]/g, '');

                if (!isDataRow) {
                    let isHeader = false;
                    // 버그 수정됨: '일반계' 등 다른 단어의 '반'을 오인식하지 않도록 매우 엄격하게 조건 변경
                    if (cleanFirst === '반번호' || cleanFirst === '반' || cleanFirst === '번호' || cleanFirst === '학번' || (cleanFirst.includes('반') && cleanFirst.includes('번호'))) {
                        isHeader = true;
                    } else {
                        // 헤더 글자가 훼손되었을 경우를 대비한 2차 숫자연속 검사 (1, 2, 3...)
                        let consecutiveNumbers = 0;
                        let expected = 1;
                        for (let c = 1; c <= Math.min(cols.length - 1, 10); c++) {
                            if (cols[c] && cols[c].replace(/[^0-9]/g, '') === String(expected)) {
                                consecutiveNumbers++;
                                expected++;
                            }
                        }
                        if (consecutiveNumbers >= 3) isHeader = true;
                    }

                    if (isHeader) {
                        isDataRow = true;
                        headerFound = true;
                        
                        for (let c = 1; c < cols.length; c++) {
                            let classNum = cols[c].replace(/[^0-9]/g, ''); 
                            if (classNum !== '') {
                                classColumns.push({ index: c, classNum: classNum });
                            }
                        }
                        continue;
                    }
                }

                if (isDataRow) {
                    let cleanStudentNumStr = firstCol.replace(/[^0-9]/g, ''); 
                    
                    if (cleanStudentNumStr !== '') {
                        let studentNum = parseInt(cleanStudentNumStr);
                        if (studentNum > 0) {
                            classColumns.forEach(c => {
                                let val = cols[c.index] !== undefined ? cols[c.index].trim() : '';
                                if (!data[c.classNum]) data[c.classNum] = {};
                                data[c.classNum][studentNum] = val;
                            });
                        }
                    }
                }
            }

            if (!headerFound || classColumns.length === 0) {
                throw new Error(`[${itemName}] 항목의 파일에서 성적 표(반/번호 헤더)를 찾을 수 없습니다. 양식이 올바른지 확인해주세요.`);
            }

            return data;
        }

        async function executeAllInOne() {
            hideError();
            document.getElementById('resultsArea').classList.add('hidden');

            try {
                const rows = document.querySelectorAll('.eval-row');
                if (rows.length === 0) return showError("평가 항목을 최소 1개 이상 추가해주세요.");

                let evals = [];
                let evalNamesOrdered = [];
                let totalWeight = 0;

                for (let i = 0; i < rows.length; i++) {
                    const name = rows[i].querySelector('.eval-name').value || `항목 ${i+1}`;
                    const weightInput = rows[i].querySelector('.eval-weight').value;
                    const fileInput = rows[i].querySelector('.eval-file');
                    
                    if (!fileInput.files.length) {
                        return showError(`[${name}] 항목의 성적 파일(.xlsx 또는 .csv)을 업로드해주세요.`);
                    }
                    
                    let weight = parseFloat(weightInput);
                    if (isNaN(weight) || weight < 0) return showError(`[${name}]의 반영 비율이 올바르지 않습니다.`);
                    
                    totalWeight += weight;
                    evals.push({ name: name, weight: weight, file: fileInput.files[0] });
                    evalNamesOrdered.push({ name: name, weight: weight });
                }

                if (Math.abs(totalWeight - 100) > 0.1) {
                    return showError(`반영 비율의 합이 100%가 아닙니다. 현재 합계: ${totalWeight}%`);
                }

                let parsedFiles = [];
                for (let ev of evals) {
                    let text = await readFile(ev.file);
                    let data = parseCSVData(text, ev.name);
                    parsedFiles.push({ name: ev.name, data: data, weight: ev.weight });
                }

                let masterDB = {}; 
                
                parsedFiles.forEach((pf) => {
                    let db = pf.data;
                    for (let cNum in db) {
                        for (let sNum in db[cNum]) {
                            let key = `${cNum}-${sNum}`;
                            let rawVal = db[cNum][sNum];

                            if (!masterDB[key]) {
                                masterDB[key] = { 
                                    classNum: parseInt(cNum), 
                                    stuNum: parseInt(sNum), 
                                    totalScore: 0, 
                                    scores: {},
                                    weightedScores: {},
                                    isDrop: false, 
                                    allEmpty: true 
                                };
                            }

                            masterDB[key].scores[pf.name] = rawVal;
                            if (rawVal !== '') masterDB[key].allEmpty = false;

                            if (DROP_KEYWORDS.some(kw => rawVal.includes(kw))) {
                                masterDB[key].isDrop = true;
                            }

                            let score = parseFloat(rawVal);
                            if (!isNaN(score)) {
                                let weighted = score * (pf.weight / 100);
                                masterDB[key].totalScore += weighted;
                                masterDB[key].weightedScores[pf.name] = weighted;
                            }
                        }
                    }
                });

                let validStudents = [];
                let dropNames = [];

                for (let key in masterDB) {
                    let stu = masterDB[key];
                    if (stu.allEmpty) continue; 
                    
                    if (stu.isDrop) {
                        let reason = "";
                        for (let evalName in stu.scores) {
                            if (DROP_KEYWORDS.some(kw => stu.scores[evalName].includes(kw))) {
                                reason = stu.scores[evalName]; break;
                            }
                        }
                        dropNames.push(`${stu.classNum}반 ${stu.stuNum}번(${reason})`);
                    } else {
                        stu.totalScore = Number(stu.totalScore.toFixed(2));
                        validStudents.push(stu);
                    }
                }

                let totalCount = validStudents.length;
                if (totalCount === 0) return showError("점수를 계산할 유효한 학생 데이터가 없습니다.");

                validStudents.sort((a, b) => {
                    if (b.totalScore !== a.totalScore) return b.totalScore - a.totalScore;
                    if (a.classNum !== b.classNum) return a.classNum - b.classNum;
                    return a.stuNum - b.stuNum;
                });
                
                let validScoresOnly = validStudents.map(s => s.totalScore);

                document.getElementById('totalCount').innerHTML = `${totalCount} <span class="text-2xl font-bold">명</span>`;
                document.getElementById('dropCount').innerText = `${dropNames.length} 명`;
                
                let dropNamesEl = document.getElementById('dropNames');
                if (dropNames.length > 0) {
                    dropNamesEl.innerText = `제외자 목록: ${dropNames.join(', ')}`;
                    dropNamesEl.style.display = 'block';
                } else {
                    dropNamesEl.style.display = 'none';
                }

                const ratios = [0.04, 0.11, 0.23, 0.40, 0.60, 0.77, 0.89, 0.96, 1.00];
                let gradeCuts = []; 
                let tbodyCuts = document.getElementById('gradeTableBody');
                tbodyCuts.innerHTML = '';

                ratios.forEach((ratio, idx) => {
                    let grade = idx + 1;
                    let targetCount = Math.round(totalCount * ratio);
                    let cutIdx = Math.min(targetCount - 1, totalCount - 1);
                    if (cutIdx < 0) cutIdx = 0;
                    
                    let cutScore = validScoresOnly[cutIdx];
                    gradeCuts.push({ grade: grade, cutScore: cutScore });

                    let displayRatio = (ratio * 100).toFixed(0);
                    
                    let tr = document.createElement('tr');
                    tr.className = grade % 2 === 0 ? "bg-gray-50 hover:bg-indigo-50" : "bg-white hover:bg-indigo-50";
                    tr.innerHTML = `
                        <td class="px-4 py-3 font-black text-gray-800"><span class="bg-indigo-100 text-indigo-800 w-6 h-6 inline-flex items-center justify-center rounded-full text-xs">${grade}</span></td>
                        <td class="px-4 py-3 text-gray-600 text-sm">${targetCount}명 <span class="text-xs text-gray-400">(${displayRatio}%)</span></td>
                        <td class="px-4 py-3 font-black text-lg text-indigo-600">${cutScore.toFixed(2)} 점</td>
                    `;
                    tbodyCuts.appendChild(tr);
                });

                let classDist = {};
                
                validStudents.forEach((stu, index) => {
                    stu.rank = index + 1; 
                    let studentGrade = 9;
                    for (let i = 0; i < gradeCuts.length; i++) {
                        if (stu.totalScore >= gradeCuts[i].cutScore) {
                            studentGrade = gradeCuts[i].grade;
                            break;
                        }
                    }
                    stu.grade = studentGrade; 

                    if (!classDist[stu.classNum]) {
                        classDist[stu.classNum] = Array(9).fill(0);
                    }
                    classDist[stu.classNum][studentGrade - 1]++;
                });

                let classKeys = Object.keys(classDist).map(Number).sort((a, b) => a - b);
                let tbodyDist = document.getElementById('distTableBody');
                tbodyDist.innerHTML = '';
                let totalDistSum = Array(9).fill(0);

                classKeys.forEach(cNum => {
                    let dist = classDist[cNum];
                    let classTotal = 0;
                    
                    let tr = document.createElement('tr');
                    tr.className = "hover:bg-green-50 transition";
                    let tdHtml = `<td class="px-3 py-3 font-bold text-gray-700 border-r bg-gray-50">${cNum}반</td>`;
                    
                    dist.forEach((count, idx) => {
                        classTotal += count;
                        totalDistSum[idx] += count;
                        let bgClass = (idx >= 3 && idx <= 5) ? "bg-blue-50/50" : "";
                        let textClass = count > 0 ? "text-gray-800 font-semibold" : "text-gray-300";
                        tdHtml += `<td class="px-2 py-3 ${bgClass} ${textClass}">${count > 0 ? count : '-'}</td>`;
                    });
                    
                    tdHtml += `<td class="px-3 py-3 font-black text-gray-800 border-l bg-gray-100">${classTotal}</td>`;
                    tr.innerHTML = tdHtml;
                    tbodyDist.appendChild(tr);
                });

                let footTr = document.createElement('tr');
                footTr.className = "bg-gray-200 border-t-2 border-gray-400";
                let footHtml = `<td class="px-3 py-3 font-black text-gray-800 border-r">전체 누계</td>`;
                
                let grandTotal = 0;
                totalDistSum.forEach((count, idx) => {
                    grandTotal += count;
                    let textClass = count > 0 ? "text-indigo-700 font-black" : "text-gray-400";
                    footHtml += `<td class="px-2 py-3 ${textClass}">${count}</td>`;
                });
                footHtml += `<td class="px-3 py-3 font-black text-indigo-700 border-l">${grandTotal}</td>`;
                footTr.innerHTML = footHtml;
                tbodyDist.appendChild(footTr);


                const detailThead = document.getElementById('detailTableHeader');
                const detailTbody = document.getElementById('detailTableBody');
                
                let theadHtml = `
                    <tr>
                        <th class="px-4 py-3 font-bold text-gray-600 bg-gray-50 border-b border-r">전체 석차</th>
                        <th class="px-4 py-3 font-bold text-gray-600 bg-gray-50 border-b border-r">등급</th>
                        <th class="px-4 py-3 font-bold text-gray-600 bg-gray-50 border-b border-r">소속 반</th>
                        <th class="px-4 py-3 font-bold text-gray-600 bg-gray-50 border-b border-r">번호</th>
                        <th class="px-4 py-3 font-black text-indigo-700 bg-indigo-50 border-b border-r">합산 총점</th>
                `;
                evalNamesOrdered.forEach(ev => {
                    theadHtml += `<th class="px-4 py-3 font-bold text-gray-600 bg-gray-50 border-b">${ev.name}<br><span class="text-xs font-normal text-blue-500">원점수 (반영:${ev.weight}%)</span></th>`;
                });
                theadHtml += `</tr>`;
                detailThead.innerHTML = theadHtml;

                detailTbody.innerHTML = '';
                validStudents.forEach((stu, index) => {
                    let tr = document.createElement('tr');
                    tr.className = index % 2 === 0 ? "bg-white hover:bg-yellow-50" : "bg-gray-50 hover:bg-yellow-50";
                    
                    let rowHtml = `
                        <td class="px-4 py-3 font-bold text-gray-700 border-r">${stu.rank}</td>
                        <td class="px-4 py-3 border-r"><span class="bg-indigo-100 text-indigo-800 w-6 h-6 inline-flex items-center justify-center rounded-full text-xs font-black">${stu.grade}</span></td>
                        <td class="px-4 py-3 text-gray-600 border-r">${stu.classNum}반</td>
                        <td class="px-4 py-3 text-gray-600 border-r">${stu.stuNum}번</td>
                        <td class="px-4 py-3 font-black text-indigo-600 border-r text-lg bg-indigo-50/30">${stu.totalScore.toFixed(2)}</td>
                    `;

                    evalNamesOrdered.forEach(ev => {
                        let rawStr = stu.scores[ev.name] || '-';
                        let weightScore = stu.weightedScores[ev.name];
                        let subHtml = `<div class="font-semibold text-gray-800">${rawStr}</div>`;
                        
                        if (weightScore !== undefined) {
                            subHtml += `<div class="text-xs text-blue-500 font-bold">(${weightScore.toFixed(2)})</div>`;
                        } else {
                            subHtml += `<div class="text-xs text-gray-400">(-)</div>`;
                        }
                        rowHtml += `<td class="px-4 py-3">${subHtml}</td>`;
                    });

                    tr.innerHTML = rowHtml;
                    detailTbody.appendChild(tr);
                });


                document.getElementById('resultsArea').classList.remove('hidden');
                document.getElementById('resultsArea').scrollIntoView({ behavior: 'smooth', block: 'start' });

            } catch (error) {
                console.error(error);
                showError(error.message || "알 수 없는 오류가 발생했습니다.");
            }
        }
    </script>
</body>
</html>
