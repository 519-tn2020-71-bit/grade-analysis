<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All-in-One 통합 성적 및 등급 계산기 (강력 탐색판)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Pretendard', sans-serif; background-color: #f3f4f6; }
        .fade-in { animation: fadeIn 0.5s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-7xl mx-auto bg-white rounded-2xl shadow-xl overflow-hidden">
        <!-- 헤더 -->
        <div class="bg-gradient-to-r from-blue-700 to-indigo-800 p-6 text-white flex justify-between items-center">

                <p class="mt-2 text-blue-100">파일의 줄 번호(행) 위치가 달라도 자동 추적하여 완벽하게 합산합니다.</p>
            </div>
            <div class="hidden md:block">
                <span class="bg-blue-900 text-blue-100 text-xs font-bold px-3 py-1 rounded-full">v2.0 스마트 파싱 적용</span>
            </div>
        </div>

        <div class="p-6 md:p-8">

                    <div class="flex-shrink-0"><i class="fas fa-exclamation-circle text-red-500 mt-1"></i></div>
                    <div class="ml-3">
                        <h3 class="text-sm font-bold text-red-800">확인이 필요합니다</h3>
                        <div class="mt-1 text-sm text-red-700" id="errorText"></div>
                    </div>
                </div>
            </div>

            <!-- 파일 및 비율 입력 섹션 -->
            <div class="bg-gray-50 rounded-xl p-6 mb-8 border border-gray-200 shadow-inner">
                <h2 class="text-lg font-bold text-gray-800 mb-4"><i class="fas fa-file-excel text-green-600 mr-2"></i> 성적 파일 업로드 (나이스 양식 그대로)</h2>
                <div class="grid grid-cols-1 md:grid-cols-5 gap-4">
                    <!-- 1회고사 -->
                    <div class="bg-white border rounded-lg p-4 shadow-sm hover:shadow-md transition">
                        <label class="font-bold text-gray-700 block mb-2">1회고사 <span class="text-xs text-gray-400 font-normal">(지필)</span></label>
                        <div class="flex items-center mb-3">
                            <input type="number" id="w0" value="35" class="w-16 border-b-2 border-blue-500 bg-gray-50 px-2 py-1 text-center font-bold text-blue-700 focus:outline-none">
                            <span class="ml-1 text-gray-500 font-bold">%</span>
                        </div>
                        <input type="file" id="f0" accept=".csv" class="text-xs w-full cursor-pointer file:mr-2 file:py-1 file:px-2 file:rounded file:border-0 file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
                    </div>
                    <!-- 2회고사 -->
                    <div class="bg-white border rounded-lg p-4 shadow-sm hover:shadow-md transition">
                        <label class="font-bold text-gray-700 block mb-2">2회고사 <span class="text-xs text-gray-400 font-normal">(지필)</span></label>
                        <div class="flex items-center mb-3">
                            <input type="number" id="w1" value="35" class="w-16 border-b-2 border-blue-500 bg-gray-50 px-2 py-1 text-center font-bold text-blue-700 focus:outline-none">
                            <span class="ml-1 text-gray-500 font-bold">%</span>
                        </div>
                        <input type="file" id="f1" accept=".csv" class="text-xs w-full cursor-pointer file:mr-2 file:py-1 file:px-2 file:rounded file:border-0 file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
                    </div>
                    <!-- 주통 -->
                    <div class="bg-white border rounded-lg p-4 shadow-sm hover:shadow-md transition">
                        <label class="font-bold text-gray-700 block mb-2">주통 <span class="text-xs text-gray-400 font-normal">(수행)</span></label>
                        <div class="flex items-center mb-3">
                            <input type="number" id="w2" value="15" class="w-16 border-b-2 border-blue-500 bg-gray-50 px-2 py-1 text-center font-bold text-blue-700 focus:outline-none">
                            <span class="ml-1 text-gray-500 font-bold">%</span>
                        </div>
                        <input type="file" id="f2" accept=".csv" class="text-xs w-full cursor-pointer file:mr-2 file:py-1 file:px-2 file:rounded file:border-0 file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
                    </div>
                    <!-- 구술 -->
                    <div class="bg-white border rounded-lg p-4 shadow-sm hover:shadow-md transition">
                        <label class="font-bold text-gray-700 block mb-2">구술 <span class="text-xs text-gray-400 font-normal">(수행)</span></label>
                        <div class="flex items-center mb-3">
                            <input type="number" id="w3" value="10" class="w-16 border-b-2 border-blue-500 bg-gray-50 px-2 py-1 text-center font-bold text-blue-700 focus:outline-none">
                            <span class="ml-1 text-gray-500 font-bold">%</span>
                        </div>
                        <input type="file" id="f3" accept=".csv" class="text-xs w-full cursor-pointer file:mr-2 file:py-1 file:px-2 file:rounded file:border-0 file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
                    </div>
                    <!-- 에세이 -->
                    <div class="bg-white border rounded-lg p-4 shadow-sm hover:shadow-md transition">
                        <label class="font-bold text-gray-700 block mb-2">에세이 <span class="text-xs text-gray-400 font-normal">(수행)</span></label>
                        <div class="flex items-center mb-3">
                            <input type="number" id="w4" value="5" class="w-16 border-b-2 border-blue-500 bg-gray-50 px-2 py-1 text-center font-bold text-blue-700 focus:outline-none">
                            <span class="ml-1 text-gray-500 font-bold">%</span>
                        </div>
                        <input type="file" id="f4" accept=".csv" class="text-xs w-full cursor-pointer file:mr-2 file:py-1 file:px-2 file:rounded file:border-0 file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
                    </div>
                </div>

                <div class="mt-6 flex justify-center">
                    <button onclick="executeAllInOne()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-12 rounded-full shadow-lg transition transform hover:-translate-y-1 text-lg flex items-center">
                        <i class="fas fa-magic mr-2"></i> 스마트 통합 데이터 산출
                    </button>
                </div>
            </div>

            <!-- 결과 대시보드 -->
            <div id="resultsArea" class="hidden fade-in space-y-8">
                
                <!-- 1. 요약 카드 -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="bg-white border border-blue-100 rounded-xl shadow-md p-6 flex items-center justify-between relative overflow-hidden">
                        <div class="absolute right-0 top-0 w-24 h-24 bg-blue-50 rounded-bl-full z-0"></div>
                        <div class="relative z-10">
                            <p class="text-sm text-gray-500 font-bold mb-1">최종 등급 산출 대상 인원</p>
                            <p class="text-5xl font-black text-blue-600" id="totalCount">- <span class="text-2xl font-bold">명</span></p>
                        </div>
                        <i class="fas fa-user-graduate text-5xl text-blue-200 relative z-10"></i>
                    </div>
                    
                    <div class="bg-white border border-red-100 rounded-xl shadow-md p-6 relative overflow-hidden">
                        <div class="absolute right-0 top-0 w-24 h-24 bg-red-50 rounded-bl-full z-0"></div>
                        <div class="relative z-10 flex justify-between items-start">
                            <div>
                                <p class="text-sm text-gray-500 font-bold mb-1">자동 제외 대상자 (자퇴/전출 등)</p>
                                <p class="text-4xl font-black text-red-500" id="dropCount">- 명</p>
                                <div id="dropNames" class="mt-2 text-sm text-red-600 font-medium bg-red-50 p-2 rounded-lg border border-red-100 inline-block"></div>
                            </div>
                            <i class="fas fa-user-slash text-4xl text-red-200"></i>
                        </div>
                    </div>
                </div>

                <!-- 2. 등급컷 및 반별 분포 그리드 -->
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                    
                    <!-- 왼쪽: 9등급 커트라인 표 -->
                    <div class="lg:col-span-1 bg-white rounded-xl shadow-md border border-gray-200 overflow-hidden">
                        <div class="bg-indigo-50 px-6 py-4 border-b border-gray-200">
                            <h3 class="text-lg font-bold text-indigo-900"><i class="fas fa-chart-line mr-2 text-indigo-600"></i>9등급 커트라인 (100점 만점)</h3>
                        </div>
                        <div class="overflow-x-auto">
                            <table class="min-w-full divide-y divide-gray-200 text-center">
                                <thead class="bg-gray-50">
                                    <tr>
                                        <th class="px-4 py-3 text-xs font-bold text-gray-500 uppercase">등급</th>
                                        <th class="px-4 py-3 text-xs font-bold text-gray-500 uppercase">누적 인원</th>
                                        <th class="px-4 py-3 text-xs font-bold text-indigo-600 uppercase">커트라인</th>
                                    </tr>
                                </thead>
                                <tbody id="gradeTableBody" class="bg-white divide-y divide-gray-200">
                                    <!-- 등급 컷 데이터 렌더링 -->
                                </tbody>
                            </table>
                        </div>
                    </div>

                    <!-- 오른쪽: 반별 등급 분포도 -->
                    <div class="lg:col-span-2 bg-white rounded-xl shadow-md border border-gray-200 overflow-hidden">
                        <div class="bg-green-50 px-6 py-4 border-b border-gray-200 flex justify-between items-center">
                            <h3 class="text-lg font-bold text-green-900"><i class="fas fa-border-all mr-2 text-green-600"></i>반별 등급 분포도</h3>
                            <span class="text-xs text-green-700 bg-green-100 px-2 py-1 rounded-full font-bold">자동 분류 완료</span>
                        </div>
                        <div class="overflow-x-auto p-4">
                            <table class="min-w-full divide-y divide-gray-300 text-center border">
                                <thead class="bg-gray-100">
                                    <tr>
                                        <th class="px-3 py-3 font-bold text-gray-700 border-r">반 \ 등급</th>
                                        <th class="px-2 py-3 text-sm font-bold text-gray-600">1</th>
                                        <th class="px-2 py-3 text-sm font-bold text-gray-600">2</th>
                                        <th class="px-2 py-3 text-sm font-bold text-gray-600">3</th>
                                        <th class="px-2 py-3 text-sm font-bold text-gray-600 bg-blue-50">4</th>
                                        <th class="px-2 py-3 text-sm font-bold text-gray-600 bg-blue-50">5</th>
                                        <th class="px-2 py-3 text-sm font-bold text-gray-600 bg-blue-50">6</th>
                                        <th class="px-2 py-3 text-sm font-bold text-gray-600">7</th>
                                        <th class="px-2 py-3 text-sm font-bold text-gray-600">8</th>
                                        <th class="px-2 py-3 text-sm font-bold text-gray-600">9</th>
                                        <th class="px-3 py-3 text-sm font-black text-gray-800 border-l bg-gray-200">계</th>
                                    </tr>
                                </thead>
                                <tbody id="distTableBody" class="bg-white divide-y divide-gray-200">
                                    <!-- 반별 분포 데이터 렌더링 -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script>
        // 학적 변동 등 점수 합산에서 제외할 키워드 목록
        const DROP_KEYWORDS = ['자퇴', '전출', '제적', '유예', '면제', '위탁'];
        
        // 에러 표시 유틸
        function showError(msg) {
            const errDiv = document.getElementById('errorMessage');
            document.getElementById('errorText').innerText = msg;
            errDiv.classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
        function hideError() {
            document.getElementById('errorMessage').classList.add('hidden');
        }

        // CSV 파일 읽기 (인코딩 깨짐 완벽 방지 처리)
        async function readCSV(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsText(file, 'euc-kr');
                reader.onload = (e) => {
                    let text = e.target.result;
                    // EUC-KR로 읽었는데 글자가 깨져서 '반번호'나 '평가' 글씨가 안 보일 경우 UTF-8로 재시도
                    if (!text.includes('반번호') && !text.includes('번호') && !text.includes('평가')) {
                        const utf8Reader = new FileReader();
                        utf8Reader.readAsText(file, 'utf-8');
                        utf8Reader.onload = (e2) => resolve(e2.target.result);
                        utf8Reader.onerror = () => resolve(text); // 실패시 원본 반환
                    } else {
                        resolve(text);
                    }
                };
                reader.onerror = () => reject(new Error("파일 읽기 실패"));
            });
        }

        // 스마트 CSV 데이터 파싱 (줄 번호 무관, 띄어쓰기 무시)
        function parseCSVData(csvText, fileName) {
            // \r(캐리지리턴) 제거 후 줄바꿈 기준으로 나눔
            const lines = csvText.replace(/\r/g, '').split('\n');
            let isDataRow = false;
            let classColumns = [];
            let data = {}; // { classNum: { stuNum: rawValue } }

            for (let i = 0; i < lines.length; i++) {
                let line = lines[i];
                if (!line.trim()) continue; // 빈 줄 무시

                // 따옴표 및 양쪽 공백 제거
                let cols = line.split(',').map(c => c.replace(/"/g, '').trim()); 
                let firstCol = cols[0];

                // 띄어쓰기 모두 없앤 압축 문자열 (예: "반 번호" -> "반번호")
                let compressedFirst = firstCol.replace(/\s+/g, '');

                // 줄 위치(5행이든 6행이든 10행이든) 상관없이 이 키워드만 만나면 데이터 파싱 시작
                if (compressedFirst === '반번호' || compressedFirst === '번호') {
                    isDataRow = true;
                    // 각 열이 몇 반인지 맵핑
                    for (let c = 1; c < cols.length; c++) {
                        // 숫자만 추출 (예: "1반" -> "1")
                        let classNum = cols[c].replace(/[^0-9]/g, ''); 
                        if (classNum !== '') {
                            classColumns.push({ index: c, classNum: classNum });
                        }
                    }
                    continue; 
                }

                // isDataRow가 켜진 상태에서 첫 열이 숫자(학생 번호)이면 점수 긁어오기
                if (isDataRow && firstCol !== '' && !isNaN(firstCol)) {
                    let studentNum = parseInt(firstCol);
                    classColumns.forEach(c => {
                        let val = cols[c.index] !== undefined ? cols[c.index] : '';
                        if (!data[c.classNum]) data[c.classNum] = {};
                        data[c.classNum][studentNum] = val;
                    });
                }
            }

            // 파싱이 끝났는데 반 정보가 하나도 없다면 에러 리턴
            if (!isDataRow || classColumns.length === 0) {
                throw new Error(`[${fileName}] 파일에서 '반번호' 행을 찾지 못했습니다. 파일 구조를 확인해주세요.`);
            }

            return data;
        }

        // 메인 통합 로직
        async function executeAllInOne() {
            hideError();
            document.getElementById('resultsArea').classList.add('hidden');

            try {
                let evals = [];
                let totalWeight = 0;
                const testNames = ['1회고사', '2회고사', '주통', '구술', '에세이'];

                // 1. 파일 및 비율 유효성 검사
                for (let i = 0; i < 5; i++) {
                    const fileInput = document.getElementById(`f${i}`);
                    const weightInput = document.getElementById(`w${i}`);
                    
                    if (!fileInput.files.length) {
                        return showError(`${testNames[i]} 엑셀 파일(.csv)을 업로드해주세요.`);
                    }
                    
                    let weight = parseFloat(weightInput.value);
                    if (isNaN(weight) || weight < 0) return showError("반영 비율은 올바른 숫자여야 합니다.");
                    
                    totalWeight += weight;
                    evals.push({ weight: weight, file: fileInput.files[0] });
                }

                if (Math.abs(totalWeight - 100) > 0.1) {
                    return showError(`반영 비율의 합이 100%가 아닙니다. 현재 합계: ${totalWeight}%`);
                }

                // 2. 스마트 파일 파싱
                let parsedFiles = [];
                for (let ev of evals) {
                    let text = await readCSV(ev.file);
                    let data = parseCSVData(text, ev.file.name);
                    parsedFiles.push({ data: data, weight: ev.weight });
                }

                // 3. 데이터 병합 (모든 고사 합산)
                let masterDB = {}; // 키: "반-번호"
                
                parsedFiles.forEach((pf) => {
                    let db = pf.data;
                    for (let cNum in db) {
                        for (let sNum in db[cNum]) {
                            let key = `${cNum}-${sNum}`;
                            let rawVal = db[cNum][sNum];

                            if (!masterDB[key]) {
                                masterDB[key] = { 
                                    classNum: parseInt(cNum), 
                                    stuNum: parseInt(sNum), 
                                    totalScore: 0, 
                                    isDrop: false, 
                                    allEmpty: true 
                                };
                            }

                            if (rawVal !== '') masterDB[key].allEmpty = false;

                            // '자퇴' 등 제외 키워드 감지 시 해당 학생 드롭 처리
                            if (DROP_KEYWORDS.some(kw => rawVal.includes(kw))) {
                                masterDB[key].isDrop = true;
                            }

                            // '미인정결' 등 문자열은 parseFloat에서 NaN이 되어 0점(미합산) 처리됨
                            let score = parseFloat(rawVal);
                            if (!isNaN(score)) {
                                // 만점 대비 가중치 비율을 곱하여 합산
                                masterDB[key].totalScore += score * (pf.weight / 100);
                            }
                        }
                    }
                });

                // 4. 유효 학생 리스트 도출
                let validStudents = [];
                let dropNames = [];

                for (let key in masterDB) {
                    let stu = masterDB[key];
                    if (stu.allEmpty) continue; // 데이터가 아예 없는 빈 셀(유령 학생) 방지
                    
                    if (stu.isDrop) {
                        dropNames.push(`${stu.classNum}반 ${stu.stuNum}번`);
                    } else {
                        // 소수점 2자리에서 반올림 정리
                        stu.totalScore = Number(stu.totalScore.toFixed(2));
                        validStudents.push(stu);
                    }
                }

                let totalCount = validStudents.length;
                if (totalCount === 0) return showError("점수를 계산할 유효한 학생 데이터가 없습니다. 파일이 정상적인지 확인해주세요.");

                // 점수 내림차순 정렬
                validStudents.sort((a, b) => b.totalScore - a.totalScore);
                let validScoresOnly = validStudents.map(s => s.totalScore);

                // 5. 대시보드 요약 업데이트
                document.getElementById('totalCount').innerHTML = `${totalCount} <span class="text-2xl font-bold">명</span>`;
                document.getElementById('dropCount').innerText = `${dropNames.length} 명`;
                
                let dropNamesEl = document.getElementById('dropNames');
                if (dropNames.length > 0) {
                    dropNamesEl.innerText = `제외: ${dropNames.join(', ')}`;
                    dropNamesEl.style.display = 'inline-block';
                } else {
                    dropNamesEl.style.display = 'none';
                }

                // 6. 등급 커트라인 계산 (9등급제)
                const ratios = [0.04, 0.11, 0.23, 0.40, 0.60, 0.77, 0.89, 0.96, 1.00];
                let gradeCuts = []; 
                let tbodyCuts = document.getElementById('gradeTableBody');
                tbodyCuts.innerHTML = '';

                ratios.forEach((ratio, idx) => {
                    let grade = idx + 1;
                    let targetCount = Math.round(totalCount * ratio);
                    let cutIdx = Math.min(targetCount - 1, totalCount - 1);
                    if (cutIdx < 0) cutIdx = 0;
                    
                    let cutScore = validScoresOnly[cutIdx];
                    
                    gradeCuts.push({ grade: grade, cutScore: cutScore });

                    let displayRatio = (ratio * 100).toFixed(0);
                    
                    let tr = document.createElement('tr');
                    tr.className = grade % 2 === 0 ? "bg-gray-50 hover:bg-indigo-50" : "bg-white hover:bg-indigo-50";
                    tr.innerHTML = `
                        <td class="px-4 py-3 font-black text-gray-800"><span class="bg-indigo-100 text-indigo-800 w-6 h-6 inline-flex items-center justify-center rounded-full text-xs">${grade}</span></td>
                        <td class="px-4 py-3 text-gray-600 text-sm">${targetCount}명 <span class="text-xs text-gray-400">(${displayRatio}%)</span></td>
                        <td class="px-4 py-3 font-black text-lg text-indigo-600">${cutScore.toFixed(2)} 점</td>
                    `;
                    tbodyCuts.appendChild(tr);
                });

                // 7. 반별 등급 분포도 계산
                let classDist = {};
                
                validStudents.forEach(stu => {
                    let studentGrade = 9;
                    for (let i = 0; i < gradeCuts.length; i++) {
                        if (stu.totalScore >= gradeCuts[i].cutScore) {
                            studentGrade = gradeCuts[i].grade;
                            break;
                        }
                    }

                    if (!classDist[stu.classNum]) {
                        classDist[stu.classNum] = Array(9).fill(0);
                    }
                    classDist[stu.classNum][studentGrade - 1]++;
                });

                let classKeys = Object.keys(classDist).map(Number).sort((a, b) => a - b);
                let tbodyDist = document.getElementById('distTableBody');
                tbodyDist.innerHTML = '';
                let totalDistSum = Array(9).fill(0);

                classKeys.forEach(cNum => {
                    let dist = classDist[cNum];
                    let classTotal = 0;
                    
                    let tr = document.createElement('tr');
                    tr.className = "hover:bg-green-50";
                    let tdHtml = `<td class="px-3 py-3 font-bold text-gray-700 border-r bg-gray-50">${cNum}반</td>`;
                    
                    dist.forEach((count, idx) => {
                        classTotal += count;
                        totalDistSum[idx] += count;
                        let bgClass = (idx >= 3 && idx <= 5) ? "bg-blue-50/50" : "";
                        let textClass = count > 0 ? "text-gray-800 font-semibold" : "text-gray-300";
                        tdHtml += `<td class="px-2 py-3 ${bgClass} ${textClass}">${count > 0 ? count : '-'}</td>`;
                    });
                    
                    tdHtml += `<td class="px-3 py-3 font-black text-gray-800 border-l bg-gray-100">${classTotal}</td>`;
                    tr.innerHTML = tdHtml;
                    tbodyDist.appendChild(tr);
                });

                // 총계 행 추가
                let footTr = document.createElement('tr');
                footTr.className = "bg-gray-200 border-t-2 border-gray-400";
                let footHtml = `<td class="px-3 py-3 font-black text-gray-800 border-r">전체 누계</td>`;
                
                let grandTotal = 0;
                totalDistSum.forEach((count, idx) => {
                    grandTotal += count;
                    let textClass = count > 0 ? "text-indigo-700 font-black" : "text-gray-400";
                    footHtml += `<td class="px-2 py-3 ${textClass}">${count}</td>`;
                });
                footHtml += `<td class="px-3 py-3 font-black text-indigo-700 border-l">${grandTotal}</td>`;
                footTr.innerHTML = footHtml;
                tbodyDist.appendChild(footTr);

                // 결과창 보이기 및 스크롤
                document.getElementById('resultsArea').classList.remove('hidden');
                document.getElementById('resultsArea').scrollIntoView({ behavior: 'smooth', block: 'start' });

            } catch (error) {
                console.error(error);
                showError(error.message || "데이터 처리 중 예상치 못한 오류가 발생했습니다. 파일 형식을 다시 확인해주세요.");
            }
        }
    </script>
</body>
</html>
